priority:
  - yfinance
  - stooq
  - alpha_vantage

yfinance:
  rate_limit: 5  # calls per second
  retry_policy:
    max_attempts: 3
    backoff_factor: 2.0

stooq:
  rate_limit: 1
  retry_policy:
    max_attempts: 3
    backoff_factor: 2.0
    
alpha_vantage:
  api_key_env: "ALPHAVANTAGE_API_KEY"
  rate_limit: 0.2
  retry_policy:
    max_attempts: 2
    backoff_factor: 2.0
